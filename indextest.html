<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aditya AI Summarizer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  width: 420px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

/* Upload */
.upload-box {
  border: 2px dashed rgba(255,255,255,0.3);
  padding: 25px;
  border-radius: 15px;
  margin: 20px 0;
  cursor: pointer;
}

.upload-box:hover {
  border-color: #00f2fe;
}

/* Preview */
.file-preview {
  display: none;
  justify-content: space-between;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.remove-btn {
  color: red;
  cursor: pointer;
}

/* Button */
button {
  background: linear-gradient(45deg, #00f2fe, #4facfe);
  border: none;
  padding: 12px 25px;
  border-radius: 30px;
  color: white;
  cursor: pointer;
}

/* Loader */
.loader {
  display: none;
  margin-top: 10px;
}

/* Status */
#status {
  margin-top: 10px;
}

/* Download */
#downloadLink {
  display: none;
  margin-top: 10px;
  color: #00f2fe;
}
</style>
</head>

<body>

<div class="container">
  <h2>⚡ ADITYA AI</h2>
  <p>Upload your document</p>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    Click to Upload File
  </div>

  <input type="file" id="fileInput" hidden>

  <div class="file-preview" id="filePreview">
    <span id="fileName"></span>
    <span class="remove-btn" onclick="removeFile()">❌</span>
  </div>

  <button onclick="uploadFile()">Summarize</button>

  <div class="loader" id="loader">Processing...</div>

  <p id="status"></p>

  <a id="downloadLink">⬇ Download Summary</a>
</div>

<script>
let selectedFile = null;

document.getElementById("fileInput").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];

    if (selectedFile) {
        document.getElementById("fileName").innerText = selectedFile.name;
        document.getElementById("filePreview").style.display = "flex";
    }
});

function removeFile() {
    selectedFile = null;
    document.getElementById("fileInput").value = "";
    document.getElementById("filePreview").style.display = "none";
}

async function uploadFile() {
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");
    const link = document.getElementById("downloadLink");

    if (!selectedFile) {
        status.innerText = "Please select a file first";
        return;
    }

    loader.style.display = "block";
    status.innerText = "Processing...";
    link.style.display = "none";

    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
        const response = await fetch("https://adisworkflow.app.n8n.cloud/webhook-test/9eb92ac3-ae00-499d-b664-c3d4bed414cc", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Server issue");
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        link.href = url;
        link.download = "summary.txt";
        link.style.display = "block";

        status.innerText = "Done!";
    } catch (error) {
        status.innerText = "Something went wrong. Try again.";
        console.error(error);
    }

    loader.style.display = "none";
}
</script>

</body>
</html>
